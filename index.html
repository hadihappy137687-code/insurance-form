<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>فرم درخواست بیمه | نمایندگی حیدریان</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;600;700&display=swap" rel="stylesheet">

</head>

<body>

<div class="container">

<div class="header">

<div class="logo">
🛡️
</div>

<h1>نمایندگی بیمه حیدریان</h1>

<p>
سامانه ثبت درخواست آنلاین بیمه
</p>

<span class="subtitle">

صدور و تمدید انواع بیمه با ارسال آنلاین مدارک

</span>

</div>

<form id="insuranceForm" enctype="multipart/form-data">

<label>نام و نام خانوادگی</label>

<input
id="name"
type="text"
placeholder="نام خود را وارد کنید"
required>

<label>شماره موبایل</label>

<input
id="mobile"
type="tel"
placeholder="09xxxxxxxxx"
required>

<label>بیمه‌های درخواستی</label>

<div class="checkbox-group">

<label><input type="checkbox" name="insurance" value="شخص ثالث"> شخص ثالث</label>

<label><input type="checkbox" name="insurance" value="بدنه"> بدنه</label>

<label><input type="checkbox" name="insurance" value="تکمیلی"> تکمیلی</label>

<label><input type="checkbox" name="insurance" value="آتش سوزی"> آتش سوزی</label>

<label><input type="checkbox" name="insurance" value="مسئولیت"> مسئولیت</label>

</div>

<label>تاریخ انقضای بیمه</label>

<input
id="expire"
type="text"
placeholder="مثال: 1405/08/15"
required>

<label>
تصویر کارت خودرو (پشت و رو)
</label>

<input
id="carCard"
type="file"
accept="image/*,.pdf">

<label>
تصویر کارت ملی
</label>

<input
id="nationalCard"
type="file"
accept="image/*,.pdf">

<label>
تصویر بیمه نامه قبلی
</label>

<input
id="previousInsurance"
type="file"
accept="image/*,.pdf">
<label>
توضیحات
</label>

<textarea
id="note"
rows="5"
placeholder="درخواست تکمیلی، مسئولیت، آتش سوزی و..."
></textarea>

<button type="submit">ثبت درخواست</button>

</form>

</div>

<script src="script.js"></script>

</body>

</html>
