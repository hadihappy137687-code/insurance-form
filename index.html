<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>فرم درخواست بیمه | نمایندگی حیدریان</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/persian-datepicker@1.2.0/dist/css/persian-datepicker.min.css">

<script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/persian-date@1.1.0/dist/persian-date.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/persian-datepicker@1.2.0/dist/js/persian-datepicker.min.js"></script>
    
</head>

<body>

<div class="container">

<div class="header">

<div style="text-align:center;margin:15px 0;">
    <img src="file_000000009d107246af57e283f265900d.png"
         style="width:60px;height:60px;border-radius:50%;">
</div>

<h1>نمایندگی بیمه حیدریان</h1>

<p>
سامانه ثبت درخواست آنلاین بیمه
</p>

<span class="subtitle">

صدور و تمدید انواع بیمه با ارسال آنلاین مدارک

</span>

</div>

<form id="insuranceForm" enctype="multipart/form-data">

<label>نام و نام خانوادگی</label>

<input
id="name"
type="text"
placeholder="نام خود را وارد کنید"
required>

<label>شماره موبایل</label>

<input
id="mobile"
type="tel"
placeholder="09xxxxxxxxx"
required>

<label>بیمه‌های درخواستی</label>

<div class="checkbox-group">

<label><input type="checkbox" name="insurance" value="شخص ثالث"> شخص ثالث</label>

<label><input type="checkbox" name="insurance" value="بدنه"> بدنه</label>

<label><input type="checkbox" name="insurance" value="تکمیلی"> تکمیلی</label>

<label><input type="checkbox" name="insurance" value="آتش سوزی"> آتش سوزی</label>

<label><input type="checkbox" name="insurance" value="مسئولیت"> مسئولیت</label>

</div>

<label>تاریخ انقضای بیمه</label>

<input
id="expire"
type="text"
autocomplete="off"
placeholder="انتخاب تاریخ"
required>

<label>
توضیحات
</label>

<textarea
id="note"
rows="5"
placeholder="درخواست تکمیلی، مسئولیت، آتش سوزی و..."
></textarea>

<button type="submit">ثبت درخواست</button>

</form>

</div>

<script>
$(document).ready(function () {

    $("#expire").persianDatepicker({

        format: "YYYY/MM/DD",

        initialValue: false,

        autoClose: true,

        observer: true,

        calendar:{
            persian:{
                locale:"fa"
            }
        }

    });

});
</script>
    
<script src="script.js"></script>

</body>

</html>
