<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>فرم درخواست بیمه | نمایندگی حیدریان</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;600;700&display=swap" rel="stylesheet">

</head>

<body>

<div class="container">

<div class="header">

<h1>🛡️ نمایندگی بیمه حیدریان</h1>

<p>
فرم درخواست صدور یا تمدید بیمه
</p>

</div>

<form id="insuranceForm">

<label>نام و نام خانوادگی</label>

<input
type="text"
placeholder="نام خود را وارد کنید"
required>

<label>شماره موبایل</label>

<input
type="tel"
placeholder="09xxxxxxxxx"
required>

<label>نوع بیمه</label>

<select required>

<option value="">
انتخاب کنید
</option>

<option>
شخص ثالث
</option>

<option>
بدنه
</option>

</select>

<label>تاریخ انقضای بیمه</label>

<input
type="text"
placeholder="مثال: 1405/08/15"
required>

<label>
تصویر کارت خودرو (پشت و رو)
</label>

<input type="file">

<label>
تصویر کارت ملی
</label>

<input type="file">

<label>
تصویر بیمه نامه قبلی
</label>

<input type="file">

<label>
توضیحات
</label>

<textarea
rows="5"
placeholder="درخواست تکمیلی، مسئولیت، آتش سوزی و..."
></textarea>

<button>

ثبت درخواست

</button>

</form>

</div>

<script src="script.js"></script>

</body>

</html>
